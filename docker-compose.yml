services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=sqlite:////app/storage/app.db
      - STORAGE_DIR=/app/storage
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      - OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      - OPENAI_TTS_VOICE=${OPENAI_TTS_VOICE:-alloy}
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
