services:
  qwen-tts:
    build:
      context: ./qwen_tts_service
    environment:
      - QWEN_TTS_MODEL=${QWEN_TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      - QWEN_TTS_DEVICE=${QWEN_TTS_DEVICE:-cuda:0}
      - QWEN_TTS_ATTN_IMPLEMENTATION=${QWEN_TTS_ATTN_IMPLEMENTATION:-sdpa}
      - QWEN_TTS_INSTRUCT=${QWEN_TTS_INSTRUCT:-用平穩一致的講課語氣}
      - QWEN_TTS_SEED=${QWEN_TTS_SEED:-316}
      - QWEN_TTS_DO_SAMPLE=${QWEN_TTS_DO_SAMPLE:-true}
      - QWEN_TTS_TEMPERATURE=${QWEN_TTS_TEMPERATURE:-0.6}
      - QWEN_TTS_TOP_K=${QWEN_TTS_TOP_K:-10}
      - QWEN_TTS_TOP_P=${QWEN_TTS_TOP_P:-0.8}
      - QWEN_TTS_REPETITION_PENALTY=${QWEN_TTS_REPETITION_PENALTY:-1.05}
      - QWEN_TTS_SUBTALKER_DOSAMPLE=${QWEN_TTS_SUBTALKER_DOSAMPLE:-true}
      - QWEN_TTS_SUBTALKER_TEMPERATURE=${QWEN_TTS_SUBTALKER_TEMPERATURE:-0.6}
      - QWEN_TTS_SUBTALKER_TOP_K=${QWEN_TTS_SUBTALKER_TOP_K:-10}
      - QWEN_TTS_SUBTALKER_TOP_P=${QWEN_TTS_SUBTALKER_TOP_P:-0.8}
      - QWEN_TTS_MAX_CHARS_PER_CHUNK=${QWEN_TTS_MAX_CHARS_PER_CHUNK:-200}
      - QWEN_TTS_MIN_CHUNK_CHARS=${QWEN_TTS_MIN_CHUNK_CHARS:-80}
      - QWEN_TTS_SENTENCE_GAP_MS=${QWEN_TTS_SENTENCE_GAP_MS:-700}
      - QWEN_TTS_SEMICOLON_GAP_MS=${QWEN_TTS_SEMICOLON_GAP_MS:-350}
      - QWEN_TTS_PARAGRAPH_GAP_MS=${QWEN_TTS_PARAGRAPH_GAP_MS:-1000}
      - QWEN_TTS_WRAP_GAP_MS=${QWEN_TTS_WRAP_GAP_MS:-150}
      - QWEN_TTS_PAUSE_DEFAULT_MS=${QWEN_TTS_PAUSE_DEFAULT_MS:-1000}
      - QWEN_TTS_TRIM_THRESHOLD_DB=${QWEN_TTS_TRIM_THRESHOLD_DB:--42}
      - QWEN_TTS_TRIM_PAD_MS=${QWEN_TTS_TRIM_PAD_MS:-15}
      - QWEN_TTS_EDGE_FADE_MS=${QWEN_TTS_EDGE_FADE_MS:-10}
      - QWEN_TTS_MAX_BATCH_CHUNKS=${QWEN_TTS_MAX_BATCH_CHUNKS:-32}
      - QWEN_TTS_MAX_NEW_TOKENS=${QWEN_TTS_MAX_NEW_TOKENS:-1024}
      - QWEN_TTS_WORKERS=${QWEN_TTS_WORKERS:-2}
    volumes:
      - ./storage/models:/models
    gpus: all
    ports:
      - "7860:7860"

  kokoro-tts:
    build:
      context: ./kokoro_tts_service
    environment:
      - KOKORO_TTS_MODEL=${KOKORO_TTS_MODEL:-hexgrad/Kokoro-82M}
      - KOKORO_TTS_DEVICE=${KOKORO_TTS_DEVICE:-cpu}
      - KOKORO_TTS_SPEED=${KOKORO_TTS_SPEED:-1.0}
      - KOKORO_TTS_SENTENCE_GAP_MS=${KOKORO_TTS_SENTENCE_GAP_MS:-700}
      - KOKORO_TTS_PARAGRAPH_GAP_MS=${KOKORO_TTS_PARAGRAPH_GAP_MS:-1000}
      - KOKORO_TTS_PAUSE_DEFAULT_MS=${KOKORO_TTS_PAUSE_DEFAULT_MS:-1000}
      - KOKORO_TTS_WORKERS=${KOKORO_TTS_WORKERS:-4}
    volumes:
      - ./storage/models:/models
    gpus: all
    ports:
      - "7861:7861"

  bark-tts:
    build:
      context: ./bark_tts_service
    environment:
      - BARK_TTS_MODEL=${BARK_TTS_MODEL:-suno/bark}
      - BARK_TTS_DEVICE=${BARK_TTS_DEVICE:-cuda:0}
      - BARK_TTS_SEED=${BARK_TTS_SEED:-316}
      - BARK_TTS_DO_SAMPLE=${BARK_TTS_DO_SAMPLE:-true}
      - BARK_TTS_SEMANTIC_TEMPERATURE=${BARK_TTS_SEMANTIC_TEMPERATURE:-0.7}
      - BARK_TTS_COARSE_TEMPERATURE=${BARK_TTS_COARSE_TEMPERATURE:-0.7}
      - BARK_TTS_FINE_TEMPERATURE=${BARK_TTS_FINE_TEMPERATURE:-0.5}
      - BARK_TTS_MAX_CHARS_PER_CHUNK=${BARK_TTS_MAX_CHARS_PER_CHUNK:-220}
      - BARK_TTS_MIN_CHUNK_CHARS=${BARK_TTS_MIN_CHUNK_CHARS:-0}
      - BARK_TTS_SENTENCE_GAP_MS=${BARK_TTS_SENTENCE_GAP_MS:-700}
      - BARK_TTS_SEMICOLON_GAP_MS=${BARK_TTS_SEMICOLON_GAP_MS:-350}
      - BARK_TTS_PARAGRAPH_GAP_MS=${BARK_TTS_PARAGRAPH_GAP_MS:-1000}
      - BARK_TTS_WRAP_GAP_MS=${BARK_TTS_WRAP_GAP_MS:-150}
      - BARK_TTS_PAUSE_DEFAULT_MS=${BARK_TTS_PAUSE_DEFAULT_MS:-1000}
      - BARK_TTS_TRIM_THRESHOLD_DB=${BARK_TTS_TRIM_THRESHOLD_DB:--42}
      - BARK_TTS_TRIM_PAD_MS=${BARK_TTS_TRIM_PAD_MS:-15}
      - BARK_TTS_EDGE_FADE_MS=${BARK_TTS_EDGE_FADE_MS:-10}
      - BARK_TTS_WORKERS=${BARK_TTS_WORKERS:-1}
    volumes:
      - ./storage/models:/models
    gpus: all
    ports:
      - "7862:7862"

  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=sqlite:////app/storage/app.db
      - STORAGE_DIR=/app/storage
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-*}
      - TTS_PROVIDER=${TTS_PROVIDER:-qwen_local}
      - QWEN_TTS_ENDPOINT=${QWEN_TTS_ENDPOINT:-http://qwen-tts:7860/tts}
      - QWEN_TTS_MODEL=${QWEN_TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      - QWEN_TTS_VOICE=${QWEN_TTS_VOICE:-Ryan}
      - QWEN_TTS_VOICES=${QWEN_TTS_VOICES:-Ryan:Ryan,Aiden:Aiden,Vivian:Vivian,Serena:Serena,Uncle_Fu:Uncle Fu,Dylan:Dylan,Eric:Eric,Ono_Anna:Ono Anna,Sohee:Sohee}
      - KOKORO_TTS_ENDPOINT=${KOKORO_TTS_ENDPOINT:-http://kokoro-tts:7861/tts}
      - KOKORO_TTS_WORKERS=${KOKORO_TTS_WORKERS:-4}
      - KOKORO_TTS_VOICE=${KOKORO_TTS_VOICE:-af_heart}
      - KOKORO_TTS_VOICES=${KOKORO_TTS_VOICES:-af_heart:Heart (US female),af_bella:Bella (US female),af_nicole:Nicole (US female),af_sky:Sky (US female),am_michael:Michael (US male),am_fenrir:Fenrir (US male),am_puck:Puck (US male),bf_emma:Emma (UK female),bm_george:George (UK male),bm_fable:Fable (UK male)}
      - BARK_TTS_ENDPOINT=${BARK_TTS_ENDPOINT:-http://bark-tts:7862/tts}
      - BARK_TTS_MODEL=${BARK_TTS_MODEL:-suno/bark}
      - BARK_TTS_WORKERS=${BARK_TTS_WORKERS:-1}
      - BARK_TTS_VOICE=${BARK_TTS_VOICE:-v2/en_speaker_6}
      - BARK_TTS_VOICES=${BARK_TTS_VOICES:-v2/en_speaker_6:English Speaker 6,v2/en_speaker_9:English Speaker 9,v2/en_speaker_3:English Speaker 3,v2/zh_speaker_1:Chinese Speaker 1,v2/zh_speaker_4:Chinese Speaker 4,v2/zh_speaker_9:Chinese Speaker 9,v2/ja_speaker_3:Japanese Speaker 3,v2/ko_speaker_0:Korean Speaker 0}
      - OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      - OPENAI_TTS_VOICE=${OPENAI_TTS_VOICE:-alloy}
      - OPENAI_TTS_VOICES=${OPENAI_TTS_VOICES:-alloy:Alloy,ash:Ash,ballad:Ballad,coral:Coral,echo:Echo,fable:Fable,nova:Nova,onyx:Onyx,sage:Sage,shimmer:Shimmer,verse:Verse}
      - VIDEO_ENCODER=${VIDEO_ENCODER:-h264_nvenc}
      - VIDEO_FPS=${VIDEO_FPS:-6}
      - VIDEO_SEGMENT_WORKERS=${VIDEO_SEGMENT_WORKERS:-4}
      - TTS_WORKERS=${TTS_WORKERS:-3}
    volumes:
      - ./storage:/app/storage
    gpus: all
    ports:
      - "8000:8000"
    depends_on:
      - qwen-tts
      - kokoro-tts
      - bark-tts

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
